name = "mysub"
main = "src/worker.js"
compatibility_date = "2026-06-28"

kv_namespaces = [
  { binding = "SUB_KV", id = "b2eb7d7284e94ecbbac5d809ad2ef49d" }
]

# Environment variables
# Set these in Cloudflare Dashboard: Workers & Pages > mysub > Settings > Variables and Secrets
# DO NOT declare them in [vars] here - empty values will override Dashboard settings on deploy
#
# Required:
#   MAIN_SUB_URL - main subscription URL
#
# Optional:
#   BOOTSTRAP_SUB_URL - bootstrap subscription URL
#   HOME_SECRET_RULE_URL - home-secret rule URL
#   SENSITIVE_RULE_URL - sensitive rule URL
#   ALLOWED_TOKENS - comma-separated allowed tokens
#   PUBLIC_BASE_URL - defaults to request origin if not set
#
# Secret (use "Add secret" in Dashboard):
#   ADMIN_SECRET - for template upload
